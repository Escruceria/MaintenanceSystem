services:
  postgres:
    image: postgres:16-alpine
    container_name: maintenance-postgres
    environment:
      POSTGRES_USER: maintenance
      POSTGRES_PASSWORD: maintenance
      POSTGRES_DB: maintenance_system
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintenance -d maintenance_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: maintenance-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://maintenance:maintenance@postgres:5432/maintenance_system?schema=public
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      UPLOAD_ROOT: /app/storage
    ports:
      - "4000:4000"
    volumes:
      - evidence-storage:/app/storage

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: maintenance-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      API_INTERNAL_URL: http://api:4000/api
      DASHBOARD_ADMIN_EMAIL: admin@maintenance.local
      DASHBOARD_ADMIN_PASSWORD: Admin123*
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  evidence-storage:
